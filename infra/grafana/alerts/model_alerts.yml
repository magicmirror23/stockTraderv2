groups:
  - name: stocktrader_model_alerts
    rules:
      - alert: HighPredictionLatency
        expr: histogram_quantile(0.99, rate(stocktrader_prediction_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prediction latency p99 exceeds 2s"
          description: "p99 prediction latency has been above 2 seconds for 5 minutes."

      - alert: ModelAccuracyDrop
        expr: stocktrader_model_accuracy < 0.50
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Model accuracy dropped below 50%"
          description: "The model accuracy gauge is below 0.50 for 10 minutes."

      - alert: DriftDetected
        expr: increase(stocktrader_drift_detected_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Data/feature drift detected"
          description: "Drift detection fired for {{ $labels.feature }} ({{ $labels.test_type }})."

      - alert: RetrainFailure
        expr: increase(stocktrader_retrain_runs_total{status="failed"}[1h]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Model retrain failed"
          description: "A scheduled or manual retrain has failed in the last hour."

      - alert: HighOptionSignalRate
        expr: rate(stocktrader_option_signals_total[5m]) > 100
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High option signal generation rate"
          description: "Option signals are being generated at >100/s for 5 minutes."
