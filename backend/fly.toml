# fly.toml — Fly.io deployment for StockTrader backend
#
# First deploy:
#   fly launch --config backend/fly.toml --dockerfile backend/Dockerfile
#   fly secrets set SECRET_KEY=<key> ANGEL_API_KEY=<key> ...
#
# Subsequent deploys:
#   fly deploy --config backend/fly.toml --dockerfile backend/Dockerfile

app = "stocktrader-api"
primary_region = "sin"          # Singapore — lowest latency to India

[build]
  dockerfile = "backend/Dockerfile"

[env]
  APP_ENV       = "production"
  PAPER_MODE    = "true"
  LOG_LEVEL     = "INFO"
  ALLOWED_ORIGINS = "*"
  # PORT is set automatically by Fly.io (8080)

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval     = "30s"
  method       = "GET"
  path         = "/api/v1/health"
  timeout      = "5s"

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 512
