name: Trigger Render Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "requirements.txt"
      - "render.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured. Use Render auto-deploy or add the deploy hook secret."
            exit 0
          fi
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
