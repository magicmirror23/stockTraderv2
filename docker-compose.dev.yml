version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stocktrader-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir backend --reload-exclude .venv/* --reload-exclude storage/* --reload-exclude models/artifacts/*

  frontend:
    image: node:22-alpine
    container_name: stocktrader-frontend
    working_dir: /app
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --proxy-config proxy.conf.json"
    environment:
      - NODE_ENV=development

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stocktrader-celery-worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      celery -A backend.services.celery_tasks worker --loglevel=info

  celery-beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stocktrader-celery-beat
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      celery -A backend.services.celery_tasks beat --loglevel=info

  postgres:
    image: postgres:17-alpine
    container_name: stocktrader-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stocktrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocktrader}
      POSTGRES_DB: ${POSTGRES_DB:-stocktrader}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocktrader}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: stocktrader-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
